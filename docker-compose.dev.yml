services:
  postgres_db:
    image: postgres:18-alpine
    container_name: memo_hub_dev
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: memo_hub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql
    restart: always

volumes:
  postgres_dev_data:
