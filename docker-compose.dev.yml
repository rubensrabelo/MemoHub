services:
  postgres_db:
    image: postgres:18-alpine
    container_name: memo_hub_dev
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: memo_hub_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d memo_hub_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend_api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: memo_hub_api
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres_db:
        condition: service_healthy

  frontend_web:
    env_file:
      - .env
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: memo_hub_web
    volumes:
      - frontend_dist:/app/dist
    depends_on:
      - backend_api

  nginx_proxy:
    image: nginx:1.27-alpine
    container_name: memo_hub_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend_web
      - backend_api

volumes:
  postgres_dev_data:
  frontend_dist:
